<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFAStrans - Monitor</title>
    <meta http-equiv="refresh" content="5">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>FFAStrans <span class="version">Linux Mimo v2.0</span></h1>
            <nav>
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/monitor" class="nav-link active">Monitor</a>
                <a href="/#workflows" class="nav-link">Workflows</a>
                <a href="/#nodes" class="nav-link">Nodes</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="section">
            <h2 style="margin-bottom:15px">Running Jobs</h2>
            <div class="panel">
                <table id="running-jobs">
                    <thead><tr><th>Workflow</th><th>Source</th><th>Processor @ Host</th><th>Status</th><th>Progress</th><th>Actions</th></tr></thead>
                    <tbody id="running-jobs-body"></tbody>
                </table>
            </div>
            <h2 style="margin:20px 0 15px">History</h2>
            <div class="panel">
                <table id="history-log">
                    <thead><tr><th>Workflow</th><th>Start</th><th>End</th><th>Source</th><th>Result</th><th>Duration</th></tr></thead>
                    <tbody id="history-log-body"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="/static/js/toast.js"></script>
    <script>
        async function loadMonitor() {
            try {
                const jobsResp = await fetch('/api/jobs');
                const jobs = await jobsResp.json();
                const running = jobs.filter(j => ['queued','running','paused'].includes(j.state));
                const tbody = document.getElementById('running-jobs-body');
                if (running.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#555;padding:30px">No running jobs</td></tr>';
                } else {
                    tbody.innerHTML = running.map(j => `<tr>
                        <td>${j.wf_id}</td>
                        <td title="${j.input_file||''}">${(j.input_file||'').split('/').pop()||'-'}</td>
                        <td>${(j.splits||[]).map(s=>s.current_node).join(', ')||'-'}</td>
                        <td><span class="state-badge state-${j.state}">${j.state}</span></td>
                        <td><div class="progress-bar" style="width:150px"><div class="progress-fill" style="width:${j.total_progress}%"></div></div><span style="font-size:.75em;color:var(--text-secondary)">${Math.round(j.total_progress)}%</span></td>
                        <td><button class="btn btn-xs btn-danger" onclick="abortJob('${j.id}')">Abort</button></td>
                    </tr>`).join('');
                }
                const histResp = await fetch('/api/history?start=0&count=100');
                const hist = await histResp.json();
                const htbody = document.getElementById('history-log-body');
                if (hist.length === 0) {
                    htbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#555;padding:30px">No history yet</td></tr>';
                } else {
                    htbody.innerHTML = hist.map(h => {
                        const dur = h.finished_at && h.started_at ? Math.round(h.finished_at - h.started_at) + 's' : '-';
                        return `<tr>
                            <td>${h.wf_name||h.wf_id}</td>
                            <td>${new Date(h.started_at*1000).toLocaleString()}</td>
                            <td>${h.finished_at ? new Date(h.finished_at*1000).toLocaleString() : '-'}</td>
                            <td>${(h.input_file||'').split('/').pop()||'-'}</td>
                            <td><span class="state-badge state-${h.state}">${h.state}</span></td>
                            <td>${dur}</td>
                        </tr>`;
                    }).join('');
                }
            } catch(e) { console.error('Monitor load error:', e); }
        }
        async function abortJob(id) {
            try {
                await fetch('/api/jobs/' + id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'abort'})});
                loadMonitor();
            } catch(e) {}
        }
        loadMonitor();
    </script>
</body>
</html>
