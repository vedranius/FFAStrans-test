<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFAStrans Linux Mimo</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>FFAStrans <span class="version">Linux Mimo v2.0</span></h1>
            <nav>
                <a href="#" class="nav-link active" onclick="showSection('dashboard')">Dashboard</a>
                <a href="#" class="nav-link" onclick="showSection('workflows')">Workflows</a>
                <a href="#" class="nav-link" onclick="showSection('settings')">Settings</a>
                <a href="/monitor" class="nav-link">Monitor (Live)</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="dashboard" class="section">
            <div class="stats-grid">
                <div class="stat-card"><h3>Active Jobs</h3><div class="stat-value" id="active-jobs-count">0</div></div>
                <div class="stat-card"><h3>Workflows</h3><div class="stat-value" id="workflow-count">0</div></div>
                <div class="stat-card"><h3>Completed</h3><div class="stat-value" id="completed-count">0</div></div>
                <div class="stat-card"><h3>Failed</h3><div class="stat-value" id="failed-count">0</div></div>
            </div>
            <div class="panels">
                <div class="panel"><h2>Active Jobs</h2><table id="active-jobs-table"><thead><tr><th>Job ID</th><th>Workflow</th><th>Source</th><th>Status</th><th>Progress</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
                <div class="panel"><h2>Recent History</h2><table id="history-table"><thead><tr><th>Time</th><th>Workflow</th><th>Source</th><th>Result</th><th>Duration</th></tr></thead><tbody></tbody></table></div>
            </div>
        </section>

        <section id="workflows" class="section" style="display:none">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="createNewWorkflow()">+ New Workflow</button>
                <button class="btn" onclick="importWorkflow()">Import</button>
            </div>
            <div id="workflow-list"></div>

            <div id="wf-editor" style="display:none">
                <div class="toolbar">
                    <button class="btn" onclick="closeEditor()">Back</button>
                    <button class="btn btn-primary" onclick="saveWorkflow()">Save</button>
                    <button class="btn btn-success" onclick="runWorkflow()">Run Job</button>
                    <span id="editor-wf-name" style="color:#aaa;margin-left:10px"></span>
                </div>
                <div class="editor-workspace">
                    <div class="node-palette" id="node-palette"></div>
                    <div class="canvas-container" id="canvas-container">
                        <canvas id="wf-canvas"></canvas>
                    </div>
                    <div class="properties-panel" id="properties-panel">
                        <h3>Properties</h3>
                        <p style="color:#aaa;font-size:.85em">Click a node to edit.</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="settings" class="section" style="display:none">
            <div class="panel" style="max-width:600px">
                <h2>System Settings</h2>
                <div class="form-group"><label>Host Name</label><input type="text" id="set-hostname" readonly></div>
                <div class="form-group"><label>API Port</label><input type="number" id="set-port" value="8080"></div>
                <div class="form-group"><label>Max Concurrent Jobs</label><input type="number" id="set-max-jobs" value="4"></div>
                <div class="form-group"><label>Input Directory</label><input type="text" id="set-input-dir" value="drop_folders/input"></div>
                <div class="form-group"><label>Output Directory</label><input type="text" id="set-output-dir" value="drop_folders/output"></div>
                <button class="btn btn-primary" onclick="alert('Settings saved!')">Save Settings</button>
            </div>
        </section>
    </main>

    <div id="modal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Title</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/workflow.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
